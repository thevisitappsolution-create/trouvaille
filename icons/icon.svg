<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a6bf0"/>
      <stop offset="0.55" stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#16c2b0"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffae4"/>
      <stop offset="1" stop-color="#fff2c8"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- tuile lettre -->
  <g filter="url(#sh)">
    <rect x="126" y="118" width="260" height="260" rx="46" fill="url(#tile)"/>
    <rect x="126" y="330" width="260" height="48" rx="46" fill="#d9a441"/>
    <rect x="126" y="330" width="260" height="24" fill="#d9a441"/>
    <rect x="126" y="118" width="260" height="236" rx="46" fill="url(#tile)"/>
    <text x="256" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="200" font-weight="700" fill="#4a3b1a" text-anchor="middle">T</text>
  </g>
  <!-- petite loupe -->
  <g transform="translate(330,318)" stroke="#4a3b1a" stroke-width="14" fill="none">
    <circle cx="0" cy="0" r="30" fill="#bfe9ff"/>
    <line x1="22" y1="22" x2="52" y2="52" stroke-linecap="round"/>
  </g>
</svg>
